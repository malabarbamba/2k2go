name: Bug report
description: Report a reproducible bug
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        For security vulnerabilities, do not file a public issue.
        Use the Security Policy instead.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Short description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and sample input
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, browser, and any relevant details

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed secrets and personal data from logs/screenshots.
          required: true
