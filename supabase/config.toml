# Local ports are pinned outside common Windows excluded 5432x ranges.
[api]
port = 55431

[db]
port = 55432
shadow_port = 55430

[studio]
port = 55433

[inbucket]
port = 55434
smtp_port = 55435
pop3_port = 55436

[analytics]
port = 55437
vector_port = 55438

[auth]
site_url = "https://www.arabeimmersion.fr"
additional_redirect_urls = [
  "https://arabeimmersion.fr/auth/callback",
  "https://www.arabeimmersion.fr/auth/callback",
  "https://arabeimmersion.pages.dev/auth/callback",
  "https://*.arabeimmersion.pages.dev/auth/callback",
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/auth/callback"
]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

# =============================================================================
# SECURITY: JWT Verification Configuration
# Updated: 2026-02-24 - T11 matrix normalization
# 
# verify_jwt = true  = Gateway JWT required (anon/user/service JWT accepted)
# verify_jwt = false = Gateway JWT bypassed (webhook/internal only, with in-code secret/signature checks)
# =============================================================================

# Public/User Functions - keep gateway JWT verification enabled
